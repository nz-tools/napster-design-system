<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff;font-family:var(--font-sans)}
.card{padding:20px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.swatch{display:flex;flex-direction:column;gap:8px;padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.chip{width:100%;height:78px;border-radius:12px;border:1px solid rgba(255,255,255,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.label{font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:.01em;margin-top:2px}
.hex{font-size:11px;color:rgba(255,255,255,.55);font-variant-numeric:tabular-nums;letter-spacing:.04em;text-transform:uppercase}
</style></head><body class="napster"><div class="card">
  <div class="swatch"><div class="chip" style="background:#000"></div><div class="label">Jet Black</div><div class="hex">#000000 · 70%</div></div>
  <div class="swatch"><div class="chip" style="background:#1A0918"></div><div class="label">Mulberry</div><div class="hex">#1A0918 · 20%</div></div>
  <div class="swatch"><div class="chip" style="background:#BE369D"></div><div class="label">Napster Pink</div><div class="hex">#BE369D · 5%</div></div>
  <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="label">Pure White</div><div class="hex">#FFFFFF</div></div>
</div></body></html>
