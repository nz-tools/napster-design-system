<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#000;font-family:var(--font-body);color:var(--fg);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.sw{aspect-ratio:1.3/1;border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);}
.sw .hex{font-family:var(--font-body);font-size:11px;letter-spacing:0.05em;opacity:0.9;}
.sw .nm{font-family:var(--font-body);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;opacity:0.7;}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#33295C;"><span class="nm">indigo</span><span class="hex">#33295C</span></div>
  <div class="sw" style="background:#3C185A;"><span class="nm">violet-deep</span><span class="hex">#3C185A</span></div>
  <div class="sw" style="background:#370971;"><span class="nm">violet-mid</span><span class="hex">#370971</span></div>
  <div class="sw" style="background:#130522;"><span class="nm">plum-bg</span><span class="hex">#130522</span></div>
  <div class="sw" style="background:#4E1640;"><span class="nm">plum-panel</span><span class="hex">#4E1640</span></div>
  <div class="sw" style="background:#202226;"><span class="nm">charcoal</span><span class="hex">#202226</span></div>
  <div class="sw" style="background:#FF4D6D;"><span class="nm">coral</span><span class="hex">#FF4D6D</span></div>
  <div class="sw" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);"><span class="nm">panel</span><span class="hex">fff / 4%</span></div>
</div>
</body></html>
