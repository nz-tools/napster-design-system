<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff;font-family:var(--font-sans)}
.card{padding:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g{height:140px;border-radius:16px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;border:1px solid rgba(255,255,255,.06)}
.g .name{font-family:var(--font-display);font-weight:600;font-size:13px;color:#fff}
.g .meta{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
</style></head><body class="napster"><div class="card">
  <div class="g" style="background:var(--napster-pulse)"><div class="name">Pulse</div><div class="meta">#EA2DD2 → #FF7DF3</div></div>
  <div class="g" style="background:var(--napster-neon)"><div class="name" style="color:#1A0918">Neon</div><div class="meta" style="color:rgba(26,9,24,.7)">#FF7DF3 → #FDE5D5</div></div>
  <div class="g" style="background:var(--napster-midnight);border:1px solid rgba(255,255,255,.12)"><div class="name">Midnight</div><div class="meta">#2E0833 → #000</div></div>
  <div class="g" style="background:var(--napster-space);border:1px solid rgba(255,255,255,.12)"><div class="name">Space</div><div class="meta">#3F236B → #0C0107</div></div>
  <div class="g" style="background:var(--napster-dawn);border:1px solid rgba(255,255,255,.12)"><div class="name">Dawn</div><div class="meta">#1A0918 → #000</div></div>
  <div class="g" style="background:var(--napster-beam)"><div class="name" style="color:#1A0918">Beam ✦</div><div class="meta" style="color:rgba(26,9,24,.7)">signature ribbon</div></div>
</div></body></html>
