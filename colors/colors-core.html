<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#000;font-family:var(--font-body);color:var(--fg);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.sw{aspect-ratio:1.3/1;border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06);}
.sw .hex{font-family:var(--font-body);font-size:11px;letter-spacing:0.05em;opacity:0.9;}
.sw .nm{font-family:var(--font-body);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;opacity:0.7;}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#000;border:1px solid rgba(255,255,255,.2);"><span class="nm">bg</span><span class="hex">#000000</span></div>
  <div class="sw" style="background:#FFFFFF;color:#000;"><span class="nm" style="opacity:.7">fg</span><span class="hex">#FFFFFF</span></div>
  <div class="sw" style="background:#DD52CB;"><span class="nm">pink</span><span class="hex">#DD52CB</span></div>
  <div class="sw" style="background:#BE369D;"><span class="nm">pink-deep</span><span class="hex">#BE369D</span></div>
  <div class="sw" style="background:#EA2DD2;"><span class="nm">pink-bright</span><span class="hex">#EA2DD2</span></div>
  <div class="sw" style="background:#FFA1F3;color:#000;"><span class="nm" style="opacity:.7">pink-rim</span><span class="hex">#FFA1F3</span></div>
  <div class="sw" style="background:#FF10E8;"><span class="nm">pink-glow</span><span class="hex">#FF10E8</span></div>
  <div class="sw" style="background:#601656;"><span class="nm">plum-deep</span><span class="hex">#601656</span></div>
</div>
</body></html>
