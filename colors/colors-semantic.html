<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#000;color:#fff;font-family:var(--font-body);}
.row{display:flex;gap:12px;margin-bottom:12px;}
.sw{flex:1;height:50px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-family:var(--font-body);font-size:11px;letter-spacing:0.04em;}
.lbl{opacity:0.8;text-transform:uppercase;font-weight:700;font-size:10px;}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#fff;color:#000;"><span class="lbl">fg · 100%</span><span>#FFFFFF</span></div>
  <div class="sw" style="background:rgba(255,255,255,0.5);color:#000;"><span class="lbl">fg-muted · 50%</span><span>fff @ 0.5</span></div>
</div>
<div class="row">
  <div class="sw" style="background:rgba(255,255,255,0.2);"><span class="lbl">fg-subtle · 20%</span><span>fff @ 0.2</span></div>
  <div class="sw" style="background:rgba(255,255,255,0.1);"><span class="lbl">border · 10%</span><span>fff @ 0.1</span></div>
  <div class="sw" style="background:rgba(255,255,255,0.04);"><span class="lbl">panel · 4%</span><span>fff @ 0.04</span></div>
</div>
<div class="row">
  <div class="sw" style="background:#34D399;color:#000;"><span class="lbl">good</span><span>#34D399</span></div>
  <div class="sw" style="background:#FF6B7A;color:#000;"><span class="lbl">bad</span><span>#FF6B7A</span></div>
  <div class="sw" style="background:#C8C8E0;color:#000;"><span class="lbl">neutral</span><span>#C8C8E0</span></div>
</div>
</body></html>
