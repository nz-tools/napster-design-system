<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff;font-family:var(--font-sans)}
.card{padding:24px 28px;min-height:120px;display:flex;align-items:center;gap:32px}
.swatch{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.chip{width:84px;height:84px;border-radius:16px;border:1px solid rgba(255,255,255,.08)}
.label{font-family:var(--font-display);font-weight:600;font-size:13px}
.hex{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.04em;text-transform:uppercase}
</style></head><body class="napster"><div class="card">
  <div class="swatch"><div class="chip" style="background:#270A20"></div><div class="label">Purple</div><div class="hex">#270A20</div></div>
  <div class="swatch"><div class="chip" style="background:#2E0833"></div><div class="label">Plum</div><div class="hex">#2E0833</div></div>
  <div class="swatch"><div class="chip" style="background:#3F236B"></div><div class="label">Violet</div><div class="hex">#3F236B</div></div>
  <div class="swatch"><div class="chip" style="background:#B79CD9"></div><div class="label">Lilac</div><div class="hex">#B79CD9</div></div>
</div></body></html>
