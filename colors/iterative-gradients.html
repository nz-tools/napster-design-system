<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#000;color:#fff;font-family:var(--font-body);}
.grad{height:60px;border-radius:10px;margin-bottom:8px;}
.lbl{font-family:var(--font-body);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:0.08em;color:var(--pink);margin-bottom:6px;}
.sub{font-family:var(--font-body);font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:18px;}
.big{font-family:var(--font-display);font-weight:600;font-size:44px;line-height:1;letter-spacing:-0.02em;margin:6px 0;}
</style></head><body>
<div class="lbl">Hero gradient</div>
<div class="big">A specialist for every <span class="gradient-word">moment.</span></div>
<div class="sub">linear-gradient(90deg, #FFFFFF 0%, #EA2DD2 72%, #FFA1F3 88%) · apply to load-bearing noun</div>
<div class="lbl">Atmospheric backgrounds</div>
<div class="grad" style="background:linear-gradient(180deg,#140627 0%,#3C185A 100%);"></div>
<div class="grad" style="background:linear-gradient(180deg,#130522 0%,#2C0C36 100%);"></div>
</body></html>
