<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff}
.card{padding:24px 28px;display:flex;gap:20px;align-items:center}
.s{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:80px;height:80px;background:#1A0918;border:1px solid rgba(255,255,255,.18)}
.lbl{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-body)}
.val{font-family:var(--font-display);font-weight:600;font-size:11px}
</style></head><body class="napster"><div class="card">
  <div class="s"><div class="box" style="border-radius:4px"></div><div class="val">4 · xs</div><div class="lbl">--radius-xs</div></div>
  <div class="s"><div class="box" style="border-radius:8px"></div><div class="val">8 · sm</div><div class="lbl">--radius-sm</div></div>
  <div class="s"><div class="box" style="border-radius:16px"></div><div class="val">16 · md</div><div class="lbl">--radius-md</div></div>
  <div class="s"><div class="box" style="border-radius:24px"></div><div class="val">24 · lg</div><div class="lbl">--radius-lg</div></div>
  <div class="s"><div class="box" style="border-radius:32px"></div><div class="val">32 · xl</div><div class="lbl">--radius-xl</div></div>
  <div class="s"><div class="box" style="border-radius:48px"></div><div class="val">48 · 2xl</div><div class="lbl">--radius-2xl</div></div>
  <div class="s"><div class="box" style="border-radius:9999px"></div><div class="val">pill</div><div class="lbl">--radius-pill</div></div>
</div></body></html>
