<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#000;color:#fff;font-family:var(--font-body);}
.row{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.bar{background:var(--pink);height:12px;border-radius:2px;}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--pink);font-weight:700;width:110px;}
.v{font-size:11px;color:rgba(255,255,255,.5);}
</style></head><body>
<div class="row"><div class="lbl">space-1</div><div class="bar" style="width:4px;"></div><div class="v">4px · tight</div></div>
<div class="row"><div class="lbl">space-2</div><div class="bar" style="width:8px;"></div><div class="v">8px · compact</div></div>
<div class="row"><div class="lbl">space-3</div><div class="bar" style="width:12px;"></div><div class="v">12px · default gap</div></div>
<div class="row"><div class="lbl">space-4</div><div class="bar" style="width:16px;"></div><div class="v">16px · card internal</div></div>
<div class="row"><div class="lbl">space-5</div><div class="bar" style="width:20px;"></div><div class="v">20px · button H-pad</div></div>
<div class="row"><div class="lbl">space-6</div><div class="bar" style="width:24px;"></div><div class="v">24px · section</div></div>
<div class="row"><div class="lbl">space-8</div><div class="bar" style="width:32px;"></div><div class="v">32px · large</div></div>
<div class="row"><div class="lbl">space-12</div><div class="bar" style="width:48px;"></div><div class="v">48px · hero</div></div>
</body></html>
