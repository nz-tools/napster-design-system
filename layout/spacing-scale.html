<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>

  <div class="s"><div class="box" style="height:32px"></div><div class="val">32</div><div class="lbl">space-6</div></div>
  <div class="s"><div class="box" style="height:48px"></div><div class="val">48</div><div class="lbl">space-7</div></div>

</div></body></html>
