<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff}
.card{padding:32px 28px;display:flex;gap:32px;align-items:center;justify-content:space-around}
.s{display:flex;flex-direction:column;align-items:center;gap:12px}
.orb{width:96px;height:96px;border-radius:50%;background:#1A0918;border:1px solid rgba(255,255,255,.08)}
.glow-pink{box-shadow:0 0 64px rgba(190,54,157,.55),0 0 16px rgba(255,125,243,.45);background:linear-gradient(135deg,#BE369D,#EA2DD2)}
.glow-pulse{box-shadow:0 0 80px rgba(234,45,210,.45);background:linear-gradient(135deg,#EA2DD2,#FF7DF3)}
.inner{box-shadow:inset 0 1px 0 rgba(255,255,255,.18),inset 0 0 0 1px rgba(255,255,255,.06);background:#1A0918}
.drop{box-shadow:0 24px 64px rgba(0,0,0,.65),0 8px 24px rgba(0,0,0,.55);background:#1A0918;border:1px solid rgba(255,255,255,.1)}
.lbl{font-family:var(--font-display);font-weight:600;font-size:11px;color:#fff}
.sub{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.04em;text-transform:uppercase;font-family:var(--font-body)}
</style></head><body class="napster"><div class="card">
  <div class="s"><div class="orb glow-pink"></div><div class="lbl">Pink halo</div><div class="sub">--glow-pink</div></div>
  <div class="s"><div class="orb glow-pulse"></div><div class="lbl">Pulse halo</div><div class="sub">--glow-pulse</div></div>
  <div class="s"><div class="orb inner"></div><div class="lbl">Inner glow</div><div class="sub">--inner-glow</div></div>
  <div class="s"><div class="orb drop"></div><div class="lbl">Soft drop</div><div class="sub">--shadow-lg</div></div>
</div></body></html>
