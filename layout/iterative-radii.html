<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#000;font-family:var(--font-body);color:#fff;}
.row{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
.box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--pink);font-weight:700;width:80px;}
</style></head><body>
<div class="row"><div class="lbl">xs · 4</div><div class="box" style="width:60px;height:40px;border-radius:4px;">4</div></div>
<div class="row"><div class="lbl">sm · 6</div><div class="box" style="width:60px;height:40px;border-radius:6px;">6</div></div>
<div class="row"><div class="lbl">md · 10 ★</div><div class="box" style="width:100px;height:48px;border-radius:10px;">button</div></div>
<div class="row"><div class="lbl">lg · 16 ★</div><div class="box" style="width:120px;height:60px;border-radius:16px;">card</div></div>
<div class="row"><div class="lbl">xl · 24</div><div class="box" style="width:120px;height:60px;border-radius:24px;">modal</div></div>
<div class="row"><div class="lbl">pill · 100</div><div class="box" style="width:100px;height:32px;border-radius:100px;">pill</div></div>
<div class="row"><div class="lbl">full · ∞</div><div class="box" style="width:50px;height:50px;border-radius:9999px;"></div></div>
</body></html>
