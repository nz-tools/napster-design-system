<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff}
.card{padding:24px 28px;display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.w{display:flex;flex-direction:column;align-items:center;gap:6px}
.glyph{font-family:var(--font-display);font-size:64px;line-height:1}
.lbl{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.06em;text-transform:uppercase}
</style></head><body class="napster"><div class="card">
  <div class="w"><div class="glyph" style="font-weight:300">Aa</div><div class="lbl">Light</div></div>
  <div class="w"><div class="glyph" style="font-weight:400">Aa</div><div class="lbl">Regular</div></div>
  <div class="w"><div class="glyph" style="font-weight:500">Aa</div><div class="lbl">Medium</div></div>
  <div class="w"><div class="glyph" style="font-weight:600">Aa</div><div class="lbl">Semibold</div></div>
  <div class="w"><div class="glyph" style="font-weight:700">Aa</div><div class="lbl">Bold</div></div>
  <div class="w"><div class="glyph" style="font-weight:800">Aa</div><div class="lbl">Extrabold</div></div>
  <div class="w"><div class="glyph" style="font-weight:900">Aa</div><div class="lbl">Heavy</div></div>
</div></body></html>
