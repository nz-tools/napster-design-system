<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>Napster — AI companions you can see, talk to, and create with.</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; }
  /* Override the global token so EVERY reference to var(--font-body)
     within this UI kit (including inline styles in the JSX components)
     resolves to Avantt — Napster's brand sans. */
  :root { --font-body: 'Avantt', 'Arial', sans-serif; }
  body { font-family: 'Avantt', 'Arial', sans-serif; color: #fff; -webkit-font-smoothing: antialiased; }
  section { position: relative; }
  ::selection { background: var(--pink-bright); color: #fff; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="TrustBar.jsx"></script>
<script type="text/babel" src="FeatureSection.jsx"></script>
<script type="text/babel" src="ProductSlab.jsx"></script>
<script type="text/babel" src="DigitalTwin.jsx"></script>
<script type="text/babel" src="CTABand.jsx"></script>

<script type="text/babel">
const { useState } = React;

/* Real production copy from napster.com — April 2026 */
const PAGES = {
  home: {
    eyebrow: 'Meet your crew',
    headline: 'AI agents you can see, talk to, and',
    gradientWord: 'create with.',
    ctaPrimary: 'Get Started Now',
    ctaSecondary: 'Watch the Film',
    bgImage: '../../imagery/decorative/napster-hero-bg.avif',
  },
  business: {
    eyebrow: 'For business',
    headline: 'Software just became',
    gradientWord: 'labor.',
    sub: 'Deploy a crew of AI specialists across your organization. Hire, manage, and calibrate them the way you manage people.',
    ctaPrimary: 'Talk to Sales',
    ctaSecondary: 'Read the whitepaper',
    bgImage: '../../imagery/decorative/napster-footer-cta.avif',
  },
  developers: {
    eyebrow: 'For developers',
    headline: 'Build with the Napster',
    gradientWord: 'API.',
    sub: 'Deploy AI agents with lifelike video presence, real-time voice, and persistent memory — from only $0.01/minute.',
    ctaPrimary: 'Read the Docs',
    ctaSecondary: 'Get an API key',
    bgImage: '../../imagery/product/api/napster-api-product-card.avif',
  },
  learn: {
    eyebrow: 'Napster Learn',
    headline: 'Turn expertise into',
    gradientWord: 'AI agents.',
    sub: 'Napster Learn turns expertise into AI agents that train, coach, and assess your progress.',
    ctaPrimary: 'See the Demo',
    ctaSecondary: 'Download whitepaper',
    bgImage: '../../imagery/product/learn/napster-learn-product-card.avif',
  },
  view: {
    eyebrow: 'Napster View',
    headline: 'A 3D holographic display for',
    gradientWord: 'your AI.',
    sub: 'Companions step out of the screen. No headset. No glasses. Just presence.',
    ctaPrimary: 'Reserve the View',
    ctaSecondary: 'Watch the Film',
    bgImage: '../../imagery/product/view/napster-view-product-card.avif',
  },
};

/* The 7 product slabs — pulled straight from napster.com */
const PRODUCTS = [
  { eyebrow: 'Napster App', title: 'Meet the Napster App', body: 'Your own music production crew. Thousands of specialists. All with video, memory, and real personality. Write a song in minutes.', cta: 'Learn More', image: '../../imagery/product/app/napster-app-product-card.avif' },
  { eyebrow: 'Napster for Mac', title: 'Meet Napster for Mac', body: 'Thousands of specialists who stop procrastination, fix bugs, prep interviews, build prototypes, decode taxes, and make you unstoppable, straight from your Mac.', cta: 'Learn More', image: '../../imagery/product/mac/napster-mac-product-card.avif' },
  { eyebrow: 'Napster Spaces', title: 'Meet Napster Spaces', body: 'Napster Spaces adds an AI specialist to your website that knows your business, responds in real time, and moves visitors to take action.', cta: 'Learn More', image: '../../imagery/product/spaces/napster-spaces-product-card.avif' },
  { eyebrow: 'Napster Learn', title: 'Meet Napster Learn', body: 'Napster Learn turns expertise into AI agents that train, coach, and assess your progress.', cta: 'Learn More', image: '../../imagery/product/learn/napster-learn-product-card.avif' },
  { eyebrow: 'Napster View', title: 'Meet Napster View', body: 'A 3D holographic display for your AI.', cta: 'Learn More', image: '../../imagery/product/view/napster-view-product-card.avif' },
  { eyebrow: 'Napster Station', title: 'Meet Napster Station', body: 'The first AI concierge built for noisy, chaotic, real-world spaces. It sees you. It hears you. It handles everything.', cta: 'Learn More', image: '../../imagery/product/station/napster-station-hero.jpg' },
  { eyebrow: 'Napster API', title: 'Meet Napster API', body: 'Deploy AI agents with lifelike video presence, real-time voice, and persistent memory — from only $0.01/minute.', cta: 'Learn More', image: '../../imagery/product/api/napster-api-product-card.avif' },
];

function Home() {
  return (
    <>
      <Hero {...PAGES.home} />
      <TrustBar />
      <FeatureSection />
      <section style={{ padding: '80px 40px 24px', textAlign: 'center', background: '#000' }}>
        <p className="eyebrow" style={{ marginBottom: 20 }}>Products</p>
        <h2 style={{
          fontFamily: 'var(--font-display)', fontSize: 56, fontWeight: 600,
          lineHeight: 1.05, letterSpacing: '-0.02em', margin: 0,
        }}>
          One platform. <span className="gradient-word">Many doors.</span>
        </h2>
        <p style={{ marginTop: 20, fontSize: 17, color: 'rgba(255,255,255,0.65)', fontFamily: 'var(--font-body)' }}>
          For you, for teams, for developers. Same mission. Same system.
        </p>
      </section>
      {PRODUCTS.map((p, i) => (
        <ProductSlab key={i} {...p} align={i % 2 === 0 ? 'left' : 'right'} />
      ))}
      <DigitalTwin />
      <CTABand />
      <Footer />
    </>
  );
}

function StandardPage({ page }) {
  const data = PAGES[page];
  return (
    <>
      <Hero {...data} showFooterLinks={false} />
      <TrustBar />
      <FeatureSection />
      <CTABand />
      <Footer />
    </>
  );
}

function App() {
  const [page, setPage] = useState(() => localStorage.getItem('napster-page') || 'home');
  React.useEffect(() => { localStorage.setItem('napster-page', page); window.scrollTo(0, 0); }, [page]);
  return (
    <>
      <Nav page={page} setPage={setPage} />
      {page === 'home' ? <Home /> : <StandardPage page={page} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
