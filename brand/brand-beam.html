<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff;font-family:var(--font-body)}
.card{position:relative;padding:0;height:240px;overflow:hidden}
.bg{position:absolute;inset:0;background:#000}
.beam{position:absolute;inset:-20% -10%;background:var(--gradient-beam);filter:blur(40px);mix-blend-mode:screen;opacity:.85}
.grain{position:absolute;inset:0;background:url("../imagery/decorative/napster-grain-texture.jpg") center/cover;mix-blend-mode:screen;opacity:.18}
.fg{position:relative;z-index:2;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px}
.t{font-family:var(--font-display);font-weight:700;font-size:36px;letter-spacing:-.02em}
.s{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.7)}
</style></head><body class="napster"><div class="card">
  <div class="bg"></div>
  <div class="beam"></div>
  <div class="grain"></div>
  <div class="fg"><div class="s">Brand element · Signature gradient ribbon</div><div class="t">The Beam</div></div>
</div></body></html>
