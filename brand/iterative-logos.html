<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#000;color:#fff;font-family:var(--font-body);display:flex;gap:24px;align-items:center;}
.logo{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:center;min-height:80px;}
.logo img{max-height:36px;width:auto;}
.mark{flex:0 0 96px;}
.mark img{max-height:60px;}
.word{flex:1;}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--pink);font-weight:700;margin-top:6px;display:block;text-align:center;}
</style></head><body>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
  <div class="logo mark"><img src="../assets/logos/icon/icon-white.svg" alt=""></div>
  <span class="lbl">N-mark</span>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;">
  <div class="logo word"><img src="../assets/logos/horizontal/horizontal-white.svg" alt=""></div>
  <span class="lbl">Horizontal wordmark</span>
</div>
</body></html>
