<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff;font-family:var(--font-body)}
.card{padding:24px 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.t{position:relative;aspect-ratio:4/3;border-radius:16px;overflow:hidden;background:#1A0918;border:1px solid rgba(255,255,255,.08)}
.t .bg{position:absolute;inset:0;background-size:cover;background-position:center}
.t::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 40%, rgba(0,0,0,.85) 100%)}
.label{position:absolute;left:16px;bottom:14px;z-index:2}
.eyebrow{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#FFA1F3;font-weight:700;margin-bottom:4px}
.title{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:-.01em;line-height:1.15}
</style></head><body class="napster"><div class="card">
  <div class="t">
    <div class="bg" style="background-image:url('../imagery/decorative/napster-hero-bg.avif')"></div>
    <div class="label"><div class="eyebrow">Atmospheric</div><div class="title">Hero background</div></div>
  </div>
  <div class="t">
    <div class="bg" style="background-image:url('../imagery/product/app/napster-app-product-card.avif')"></div>
    <div class="label"><div class="eyebrow">Product · App</div><div class="title">Music crew</div></div>
  </div>
  <div class="t">
    <div class="bg" style="background-image:url('../imagery/product/mac/napster-mac-product-card.avif')"></div>
    <div class="label"><div class="eyebrow">Product · Mac</div><div class="title">Desktop crew</div></div>
  </div>
  <div class="t">
    <div class="bg" style="background-image:url('../imagery/product/spaces/napster-spaces-product-card.avif')"></div>
    <div class="label"><div class="eyebrow">Product · Spaces</div><div class="title">Web agent</div></div>
  </div>
  <div class="t">
    <div class="bg" style="background-image:url('../imagery/product/learn/napster-learn-product-card.avif')"></div>
    <div class="label"><div class="eyebrow">Product · Learn</div><div class="title">Train · coach</div></div>
  </div>
  <div class="t">
    <div class="bg" style="background-image:url('../imagery/product/view/napster-view-product-card.avif')"></div>
    <div class="label"><div class="eyebrow">Product · View</div><div class="title">3D holo display</div></div>
  </div>
  <div class="t">
    <div class="bg" style="background-image:url('../imagery/product/station/napster-station-product-card.jpg')"></div>
    <div class="label"><div class="eyebrow">Product · Station</div><div class="title">Real-world concierge</div></div>
  </div>
  <div class="t">
    <div class="bg" style="background-image:url('../imagery/product/api/napster-api-product-card.avif')"></div>
    <div class="label"><div class="eyebrow">Product · API</div><div class="title">From $0.01/min</div></div>
  </div>
</div></body></html>
