<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff;font-family:var(--font-body)}
.card{padding:32px 36px;display:flex;align-items:center;justify-content:space-between;gap:32px}
.wm{flex:1.6;display:flex;align-items:center}
.wm img{width:70%;height:auto;filter:brightness(0) invert(1)}
.ic{display:flex;gap:24px;align-items:center}
.ic .b{width:80px;height:80px;display:flex;align-items:center;justify-content:center;border-radius:18px}
.ic img{width:90%;height:90%}
</style></head><body class="napster"><div class="card">
  <div class="wm"><img src="../logos/wordmark/napster-wordmark.svg" alt="Napster"></div>
  <div class="ic">
    <div class="b" style="background:#000;border:1px solid rgba(255,255,255,.18)"><img src="../logos/icon/napster-icon-white.svg" style="filter:brightness(0) invert(1)"></div>
    <div class="b" style="background:linear-gradient(180deg,#FFA1F3,#BE369D)"><img src="../logos/icon/napster-icon-white.svg" style="filter:brightness(0)"></div>
    <div class="b" style="background:#fff"><img src="../logos/icon/napster-icon-white.svg" style="filter:brightness(0)"></div>
  </div>
</div></body></html>
