<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:28px;background:#000;color:#fff;font-family:var(--font-body);}
.eye{display:block;margin-bottom:10px;}
h1{font-family:var(--font-display);font-weight:600;font-size:48px;line-height:1.05;letter-spacing:-0.02em;margin:0 0 12px;}
p{margin:0;color:rgba(255,255,255,.6);font-size:14px;max-width:520px;line-height:1.5;}
.divider{margin:22px 0;height:1px;background:rgba(255,255,255,.08);}
.example{font-size:11px;color:rgba(255,255,255,.35);margin-top:14px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;}
</style></head><body>
<span class="eyebrow eye">Meet your crew</span>
<h1>AI companions you can see, talk to, and <span class="gradient-word">create with.</span></h1>
<p>Apply the gradient to the LOAD-BEARING NOUN only. Never verbs, articles, or modifiers. One gradient per composition.</p>
<div class="divider"></div>
<span class="eyebrow eye">Expertise on demand</span>
<h1>A specialist for every <span class="gradient-word">moment.</span></h1>
<div class="example">Live on napster.com · April 2026</div>
</body></html>
