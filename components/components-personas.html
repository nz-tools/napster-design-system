<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff;font-family:var(--font-sans)}
.card{padding:24px 28px;display:flex;gap:14px;align-items:stretch}
.p{position:relative;flex:1;aspect-ratio:3/4;border-radius:24px;overflow:hidden;background:#1A0918;border:1px solid rgba(255,255,255,.1)}
.p img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.p::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 50%, rgba(0,0,0,.85) 100%)}
.txt{position:absolute;left:14px;bottom:12px;z-index:2}
.role{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#FFA1F3;font-weight:600}
.name{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-.01em;margin-top:2px}
</style></head><body class="napster"><div class="card">
  <div class="p"><img src="../assets/persona-kai-mercer.png"><div class="txt"><div class="role">Learning</div><div class="name">Kai</div></div></div>
  <div class="p"><img src="../assets/persona-kevin-jones.png"><div class="txt"><div class="role">Finance</div><div class="name">Kevin</div></div></div>
  <div class="p"><img src="../assets/persona-jordan-carter.png"><div class="txt"><div class="role">Fitness</div><div class="name">Jordan</div></div></div>
  <div class="p"><img src="../assets/persona-may-li.png"><div class="txt"><div class="role">Lifestyle</div><div class="name">May</div></div></div>
</div></body></html>
