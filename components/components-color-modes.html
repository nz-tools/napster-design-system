<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0}
.card{padding:28px 32px;display:flex;flex-direction:column;gap:16px;background:#000;color:#fff;font-family:var(--font-body)}
.heading{font-family:var(--font-display);font-weight:700;font-size:24px;letter-spacing:-.025em;margin:0}
.sub{font-size:13px;color:rgba(255,255,255,.5);margin:0}
.sub code{font-family:var(--font-mono);font-size:12px;background:rgba(255,255,255,.06);padding:.1em .35em;border-radius:var(--r-xs)}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pane{background:var(--card-bg);color:var(--text-primary);border:1px solid var(--card-border);border-radius:var(--r-lg);padding:22px;display:flex;flex-direction:column;gap:12px}
.pane-meta{font-family:var(--font-mono);font-size:11px;letter-spacing:.02em;color:var(--text-muted)}
.pane-title{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-.01em;margin:0}
.pane .name{font-family:var(--font-display);font-weight:600;font-size:15px;margin:0}
.pane .btn{align-self:flex-start}
</style></head><body><div class="card">
  <h2 class="heading">Color Modes</h2>
  <p class="sub">Dark canonical. Light is opt-in for product/app surfaces via <code>data-theme="light"</code>.</p>
  <div class="modes">
    <section class="pane" data-theme="dark">
      <div class="pane-meta">DATA-THEME · DARK · DEFAULT</div>
      <div class="pane-title">Brand canvas.</div>
      <p class="eyebrow">Status</p>
      <p class="name">Live</p>
      <button class="btn btn-primary">Primary</button>
    </section>
    <section class="pane" data-theme="light">
      <div class="pane-meta">DATA-THEME · LIGHT · APP SURFACE</div>
      <div class="pane-title">Product surface.</div>
      <p class="eyebrow">Status</p>
      <p class="name">Live</p>
      <button class="btn btn-primary">Primary</button>
    </section>
  </div>
</div></body></html>
