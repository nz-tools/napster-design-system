<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--surface-page);color:var(--text-primary);font-family:var(--font-body)}
.card{padding:24px 28px;display:flex;gap:18px}
.c{flex:1;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--inner-glow)}
.eyebrow{margin-bottom:8px}
.ti{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:-.01em;line-height:1.15}
.bo{font-size:13px;color:var(--text-muted);line-height:1.45;margin-top:8px}
.glass{flex:1;background:var(--surface-glass-fill);backdrop-filter:var(--blur-panel);-webkit-backdrop-filter:var(--blur-panel);border:1px solid var(--surface-glass-border);border-radius:var(--r-2xl);padding:20px;box-shadow:var(--inner-glow)}
</style></head><body class="napster"><div class="card">
  <div class="c"><div class="eyebrow">● Standard card</div><div class="ti">Mulberry surface</div><div class="bo">1px hairline · 16 px radius · inner highlight.</div></div>
  <div class="glass"><div class="eyebrow" style="color:var(--focus-ring)">◯ Glass widget</div><div class="ti">Frosted overlay</div><div class="bo">Backdrop blur · 48 px radius · used for control bars.</div></div>
</div></body></html>
