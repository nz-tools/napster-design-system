<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#000;color:#fff;font-family:var(--font-sans)}
.card{padding:24px 28px;display:flex;gap:18px}
.c{flex:1;background:#1A0918;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.eye{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#EA2DD2;font-weight:600;margin-bottom:8px}
.ti{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:-.01em;line-height:1.15}
.bo{font-size:13px;color:rgba(255,255,255,.65);line-height:1.45;margin-top:8px}
.glass{flex:1;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.18);border-radius:32px;padding:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}
</style></head><body class="napster"><div class="card">
  <div class="c"><div class="eye">● Standard card</div><div class="ti">Mulberry surface</div><div class="bo">1px hairline · 24 px radius · inner highlight.</div></div>
  <div class="glass"><div class="eye" style="color:#FFA1F3">◯ Glass widget</div><div class="ti">Frosted overlay</div><div class="bo">Backdrop blur · 32 px radius · used for control bars.</div></div>
</div></body></html>
