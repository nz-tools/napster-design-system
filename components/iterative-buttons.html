<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:28px;background:#000;color:#fff;font-family:var(--font-body);display:flex;flex-direction:column;gap:16px;}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--pink);font-weight:700;margin-bottom:6px;}
.stack{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
</style></head><body>
<div>
  <div class="lbl">Primary</div>
  <div class="stack">
    <button class="btn btn-primary">Get started now</button>
    <button class="btn btn-primary" style="background:#C33DA2;">:hover</button>
    <button class="btn btn-primary" style="transform:scale(.98);">:active</button>
  </div>
</div>
<div>
  <div class="lbl">Secondary (glass)</div>
  <div class="stack">
    <button class="btn btn-secondary">Watch the film</button>
    <button class="btn btn-secondary">For Business →</button>
  </div>
</div>
</body></html>
