<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--surface-page);color:var(--text-primary);font-family:var(--font-body);display:flex;gap:16px;}
.card{flex:1;padding:20px;}
.card h4{margin:0 0 8px;font-family:var(--font-display);font-size:18px;font-weight:600;}
.card p{margin:0;font-size:13px;color:var(--text-muted);line-height:1.4;}
.eye{display:block;margin-bottom:10px;}
</style></head><body>
<div class="panel card">
  <span class="eye eyebrow">Standard panel</span>
  <h4>Persistent memory</h4>
  <p>Companions remember past conversations, picking up where you left off.</p>
</div>
<div class="panel-pink card">
  <span class="eye eyebrow" style="color:var(--focus-ring);">Pink callout</span>
  <h4>Decision gate</h4>
  <p>Used for highlighted items, decision gates, or the currently active selection.</p>
</div>
</body></html>
